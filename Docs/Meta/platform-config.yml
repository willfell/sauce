# Workshop self-install path map.
# In a real consumer vault these point at that vault's canonical locations;
# the workshop installs into itself for dogfooding the platform.

# workshop_path defaults to "../workshop/poc-vault" relative to the consumer.
# For self-install, point it at this vault's own root (resolved via adapter.basePath).
workshop_relative_path: .

variables:
  views_path: Docs/Meta/Views
  templater_scripts_path: Docs/Meta/Templater
  scripts_path: Docs/Meta/Scripts
