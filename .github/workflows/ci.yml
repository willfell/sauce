name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  preflight:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout sauce repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dev deps
        run: npm install --omit=dev

      - name: Run full release:preflight (includes integration smoke)
        run: npm run release:preflight

      - name: Tap sauce formula (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          if brew tap willfell/sauce 2>/dev/null; then
            echo "Tapped willfell/sauce"
          else
            echo "Tap unavailable — skipping brew install smoke this run"
            echo "SKIP_BREW_SMOKE=1" >> "$GITHUB_ENV"
          fi

      - name: Install sauce via brew (smoke, macOS only)
        if: matrix.os == 'macos-latest' && env.SKIP_BREW_SMOKE != '1'
        run: |
          brew install willfell/sauce/sauce || (echo "brew install failed" && exit 1)
          which sauce
          sauce help | head -3

      - name: Bootstrap a fresh vault via brewed sauce (macOS only)
        if: matrix.os == 'macos-latest' && env.SKIP_BREW_SMOKE != '1'
        run: |
          TMP_VAULT="$RUNNER_TEMP/sauce-ci-vault"
          mkdir -p "$TMP_VAULT"
          sauce bootstrap --vault "$TMP_VAULT" --non-interactive --no-register || (echo "bootstrap failed" && exit 1)
          ls -la "$TMP_VAULT"
          if sauce audit --vault "$TMP_VAULT" 2>/dev/null; then
            echo "audit ok"
          else
            echo "audit skipped or non-fatal — bootstrap-pass is the gate"
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -rf "$RUNNER_TEMP/sauce-ci-vault" 2>/dev/null || true
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew uninstall sauce 2>/dev/null || true
            brew untap willfell/sauce 2>/dev/null || true
          fi
